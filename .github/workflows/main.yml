name: Main

on:
  push:
    branches: '**'
    tags: '*'
  workflow_dispatch:

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  # The fork and upstream build different targets from the same trigger, selected by
  # owner: powerof3 ships SE/AE single-runtime via pack-skse-mod; alandtse ships the
  # VR multiruntime. Each builds on push and releases on a version tag.
  run:
    if: github.repository_owner == 'powerof3'
    uses: powerof3/pack-skse-mod/.github/workflows/pack.yml@main
    with:
      CMAKE_SE_CONFIG_PRESET: 'vs2026-windows-vcpkg-se'
      CMAKE_SE_BUILD_PRESET: 'vs2026-windows-vcpkg-se'
      CMAKE_AE_CONFIG_PRESET: 'vs2026-windows-vcpkg-ae'
      CMAKE_AE_BUILD_PRESET: 'vs2026-windows-vcpkg-ae'
      CMAKE_VR_CONFIG_PRESET: ''
      CMAKE_VR_BUILD_PRESET: ''
      FOMOD_INCLUDE_PDB: true
      FOMOD_MOD_NAME: "Dialogue History"
      FOMOD_MOD_AUTHOR: "powerofthree"
      FOMOD_MOD_NEXUS_ID: "114238"
      FOMOD_REQUIRED_INSTALLATION_DIR: "Skyrim/Data"
      PUBLISH_ARCHIVE_TYPE: '7z'

  vr:
    if: github.repository_owner == 'alandtse'
    permissions:
      contents: write # vr-pack creates the GitHub Release on a tag
    uses: ./.github/workflows/vr-pack.yml
    secrets: inherit
