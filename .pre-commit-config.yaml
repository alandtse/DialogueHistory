# Formatting/codegen is handled by pre-commit.ci on the fork (maintenance.yml is
# gated to upstream). Vendored/generated code, the verbatim license files, UTF-16
# translations and binary assets (textures, esp/pex) are excluded so the text hooks
# don't corrupt them.
ci:
  autofix_commit_msg: "style: auto fixes from pre-commit hooks"
  autoupdate_commit_msg: "ci: pre-commit autoupdate"
  autoupdate_schedule: monthly

exclude: |
  (?x)^(
    extern/.*|
    cmake/ports/.*|
    src/API/.*|
    src/ImGui/BSFont\.h|
    COPYING|
    EXCEPTIONS\.md|
    Skyrim/Data/Interface/Translations/.*|
    Skyrim/Data/.*\.(esp|pex|png|dds)$
  )

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: check-yaml
      - id: check-added-large-files
      - id: end-of-file-fixer

  # Pinned to clang-format 16 to match upstream's formatting; keeps the fork's code
  # byte-compatible so upstream rebases don't fight formatting.
  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v16.0.6
    hooks:
      - id: clang-format
        args: [--style=file]
        files: \.(h|hpp|c|cpp)$

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        additional_dependencies: ["prettier@3.1.0"]
        files: \.(json|md|yml|yaml)$
        exclude: ^Skyrim/Data/

  # Regenerate the CMake source/header lists (what maintenance.yml's ProjectGen did).
  - repo: local
    hooks:
      - id: projectgen
        name: Regenerate CMake file lists
        entry: python ProjectGen.py
        language: python
        pass_filenames: false
        files: ^(src|include)/.*\.(h|hpp|hxx|c|cpp|cxx)$
